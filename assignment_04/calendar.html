<!DOCTYPE html>
<html>
<head>
    
    <title>Jesus Peralta | Calendar</title>
    <style>
        body{
            margin: 0;
            width: 1100px;
            margin: auto;
            background-color: #2f5289;
        }
        div{
            background: white;
        }
        #header{
            background-image: url("img/January_Kirby.webp");
            padding-top:300px;
			padding-bottom: 100px;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            height: 100px;
        }
        #valentines{
            background-image: url("img/Valentines-Day.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            
        }
        #president{
            background-image: url("img/Presidents_Day.webp");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            
        }
        .midterm{
            background-image: url("img/study.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            
        }
        h1{
            color: white;
            text-align: center;
            text-shadow: 0px 0px 5px #000000;
            font-size: 4em;
            padding-top: 0;
            margin: 0;
        }
        table{
            text-align: center;
            width: 1100px;
            border-collapse: collapse;
            table-layout: fixed;
            border: none;
        }
        td{
            border: 1px solid #000000;
			padding: 10px;
            text-align: right;
            vertical-align: top;
            height: 100px;
        }
        th{
            border: 1px solid #000000;
			padding: 10px;
			border-bottom: 3px solid #000000;
        }
        p{
           text-align: center;
           color: white;
           font-size: large;
           background-color: rgba(0,0,0,0.6);
           border-radius: 10px;
        }
        .gray{
            background-color: gray;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>February 2026</h1>
    </div>
        <div>
           <table>
            <tr>
                <th>Sun</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
            </tr>
            <tr>
                <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
                <td>5</td>
                <td>6</td>
                <td>7</td>
            </tr>
            <tr>
                <td>8</td>
                <td>9</td>
                <td>10</td>
                <td>11</td>
                <td>12</td>
                <td>13</td>
                <td id="valentines"><strong>14</strong><p>Valentine's Day</p></td>
                
            </tr>
            <tr>
                <td>15</td>
                <td id="president"><strong>16</strong><p>President's Day</p></td>
                <td>17</td>
                <td>18</td>
                <td>19</td>
                <td>20</td>
                <td>21</td>
            </tr>
            <tr>
                <td>22</td>
                <td class="midterm"><strong>23</strong><p>Midterm</p></td>
                <td>24</td>
                <td>25</td>
                <td class="midterm"><strong>26</strong><p>Midterm</p></td>
                <td>27</td>
                <td>28</td>
            </tr>
            <tr>
                <td class="gray">1</td>
                <td class="gray">2</td>
                <td class="gray">3</td>
                <td class="gray">4</td>
                <td class="gray">5</td>
                <td class="gray">6</td>
                <td class="gray">7</td>
            </tr>
           </table>

        </div>
    
</body>
</html>
